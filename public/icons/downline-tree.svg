  <!-- three child nodes -->
  <circle cx="5" cy="15" r="2.3"/>
  <circle cx="12" cy="15" r="2.3"/>
  <circle cx="19" cy="15" r="2.3"/>
  <!-- subtle shoulder lines to suggest people -->
  <path d="M3 20 A2 2 0 0 1 7 20"/>
